<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uniscam</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap">
</head>
<body>
    <!--Immagine di sfondo-->
    <div class="background"></div>
    
    <!--Titolo e linea-->
    <div class="title-container">
        <h1>Il REPORT richiesto sarà disponibile a breve. Attendere, prego.</h1>
        <img class="separator" id="separator" src="img/line-vector.svg" alt="Separator">
    </div>

    <!--Logo e buffer caricamento-->
    <div class="logo-container">
        <img src="img/logo-tkh.png" class="logo" id="logo" alt="Logo">
        <img src="img/buff_img.png" class="buffer" id="buffer" alt="Animazione caricamento">
    </div>        

    <!--Logo finale-->
    <footer>
        <img class="title-footer" src="img/tkh-black.png"></img>
        <img class="logo-footer" src="img/logo-limix-header.png" alt="Logo Limix Header">
    </footer>

    <!--Script per animazione caricamento-->
    <script src="script.js"></script>
</body>
</html>
